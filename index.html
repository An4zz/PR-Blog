<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A family travel guide to the best (and worst) places to visit in Puerto Rico."
    />
    <title>Vía Conmigo</title>
    <script>
      // Failsafe: if the app's own JS/CSS bundle fails to load, show a message
      // instead of a blank page. Scoped to <script>/<link> only — transient
      // failures of images or map tiles are NOT fatal and are ignored (Leaflet
      // and React handle those). React render crashes are caught by ErrorBoundary.
      window.addEventListener(
        'error',
        function (e) {
          var tag = e && e.target && e.target.tagName;
          if (tag === 'SCRIPT' || tag === 'LINK') {
            var r = document.getElementById('root');
            if (r)
              r.innerHTML =
                '<div style="padding:16px;font:13px/1.4 monospace;color:#b91c1c;white-space:pre-wrap">' +
                'Failed to load the app:\n' +
                (e.target.src || e.target.href) +
                '</div>';
          }
        },
        true
      );
    </script>
  </head>
  <body>
    <div id="root">
      <div style="padding: 16px; font: 14px sans-serif; color: #64748b">
        Loading…
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
