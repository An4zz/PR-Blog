<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A family travel guide to the best (and worst) places to visit in Puerto Rico."
    />
    <title>Puerto Rico Family Travel Guide</title>
    <script>
      // On-screen error reporter: surfaces uncaught JS errors and failed
      // script/stylesheet loads directly in the page (useful for debugging on
      // mobile where the dev console isn't accessible). Registered in capture
      // mode so it also catches resource (404) load failures.
      (function () {
        function show(html) {
          var r = document.getElementById('root');
          if (r)
            r.innerHTML =
              '<div style="padding:16px;font:13px/1.4 monospace;color:#b91c1c;white-space:pre-wrap">' +
              html +
              '</div>';
        }
        window.addEventListener(
          'error',
          function (e) {
            if (e && e.target && (e.target.src || e.target.href)) {
              show('Failed to load resource:\n' + (e.target.src || e.target.href));
            } else if (e && e.message) {
              show(
                'JavaScript error:\n' +
                  e.message +
                  '\n' +
                  (e.filename || '') +
                  ':' +
                  (e.lineno || '')
              );
            }
          },
          true
        );
        window.addEventListener('unhandledrejection', function (e) {
          show(
            'Unhandled promise rejection:\n' +
              (e.reason && e.reason.message ? e.reason.message : e.reason)
          );
        });
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div style="padding: 16px; font: 14px sans-serif; color: #64748b">
        Loading…
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
